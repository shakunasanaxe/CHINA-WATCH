version: "3.9"

services:
  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-chinawatch2024}
      - SECRET_KEY=${SECRET_KEY:-change-me-please}
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
